<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COSMOS CHAT</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #stars { position: fixed; inset: 0; z-index: 0; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: blink var(--d) infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        #chat { position: absolute; inset: 0 0 80px 0; padding: 15px; overflow-y: auto; z-index: 1; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); position: relative; }
        .my { align-self: flex-end; background: #007bff; }
        .other { align-self: flex-start; background: #333; }
        .input-area { position: fixed; bottom: 0; width: 100%; height: 70px; background: #111; display: flex; align-items: center; padding: 10px; gap: 10px; z-index: 10; }
        input { flex: 1; height: 40px; border-radius: 20px; border: none; padding: 0 15px; background: #222; color: #fff; outline: none; }
        .btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #007bff; color: #fff; font-size: 20px; }
        video, img { width: 100%; border-radius: 10px; margin-top: 5px; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>
    <div id="stars"></div>
    <div id="overlay">
        <div style="width: 80%">
            <h1 style="color:#007bff">COSMOS</h1>
            <input type="text" id="nick" placeholder="Ник" style="width:100%; margin-bottom:10px"><br>
            <input type="password" id="pass" placeholder="Пароль" style="width:100%; margin-bottom:10px"><br>
            <button onclick="start()" style="width:100%; padding: 10px; border-radius:10px; border:none; background:#007bff; color:#fff">Войти</button>
        </div>
    </div>
    <div id="chat"></div>
    <div class="input-area">
        <label style="font-size:24px">📎<input type="file" id="f" style="display:none" onchange="up()"></label>
        <input type="text" id="m" placeholder="Сообщение...">
        <button class="btn" onclick="send()">➤</button>
    </div>

<script>
    const ROOM = "cosmos_final_2026";
    const API = `https://ntfy.sh/${ROOM}`;
    let MY_NICK = "", MY_PASS = "";

    // Звезды
    const s = document.getElementById('stars');
    for(let i=0; i<150; i++) {
        const div = document.createElement('div');
        div.className = 'star';
        div.style.width = div.style.height = Math.random()*3+'px';
        div.style.left = Math.random()*100+'%'; div.style.top = Math.random()*100+'%';
        div.style.setProperty('--d', Math.random()*3+1+'s');
        s.appendChild(div);
    }

    function start() {
        MY_NICK = document.getElementById('nick').value;
        MY_PASS = document.getElementById('pass').value;
        if(MY_NICK && MY_PASS) {
            document.getElementById('overlay').style.display = 'none';
            listen();
        }
    }

    function add(txt, user, isMe, isFile=false, fUrl="") {
        const c = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = `msg ${isMe ? 'my' : 'other'}`;
        let content = txt;
        if(isFile) {
            const ext = fUrl.split('.').pop().toLowerCase();
            if(['mp4','mov','webm'].includes(ext)) content = `<video src="${fUrl}" controls playsinline></video>`;
            else if(['jpg','png','gif','jpeg'].includes(ext)) content = `<img src="${fUrl}">`;
            else content = `<a href="${fUrl}" style="color:#fff">📄 Файл</a>`;
        }
        d.innerHTML = `<small style="color:#aaa">${user}</small><div>${content}</div>`;
        c.appendChild(d);
        c.scrollTop = c.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('m');
        if(!i.value) return;
        add(i.value, MY_NICK, true);
        await fetch(API, { method: 'POST', body: JSON.stringify({ u: MY_NICK, p: MY_PASS, m: i.value }) });
        i.value = "";
    }

    // Самая пробивная загрузка
    async function up() {
        const file = document.getElementById('f').files[0];
        if(!file) return;
        add("Загрузка видео...", "Система", true);
        
        const xhr = new XMLHttpRequest();
        xhr.open('POST', API, true);
        xhr.setRequestHeader('Filename', encodeURIComponent(file.name));
        xhr.onload = async () => {
            const res = JSON.parse(xhr.responseText);
            const url = res.attachment.url;
            add("", MY_NICK, true, true, url);
            await fetch(API, { method: 'POST', body: JSON.stringify({ u: MY_NICK, p: MY_PASS, m: 'FILE', url: url, name: file.name }) });
        };
        xhr.send(file);
    }

    function listen() {
        const source = new EventSource(`${API}/sse`);
        source.onmessage = (e) => {
            const data = JSON.parse(JSON.parse(e.data).message);
            if(data.p === MY_PASS && data.u !== MY_NICK) {
                if(data.m === 'FILE') add("", data.u, false, true, data.url);
                else add(data.m, data.u, false);
            }
        };
    }
</script>
</body>
</html>
